name: Release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build
      - name: Package dist
        run: cd dist && zip -r "../corescope-rx-${GITHUB_REF_NAME}.zip" . && cd ..
      - name: Publish release with the built artifact
        uses: softprops/action-gh-release@v2
        with:
          files: corescope-rx-*.zip
          generate_release_notes: true
